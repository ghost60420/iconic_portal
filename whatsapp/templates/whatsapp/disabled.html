{% extends "crm/base.html" %}
{% block content %}
<style>
  .wa-wrap{
    max-width:900px;
    margin:0 auto;
    color:#e5e7eb;
  }
  .wa-card{
    margin-top:16px;
    background:#111b21;
    border:1px solid #1f2a30;
    border-radius:18px;
    padding:18px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }
  .wa-title{ margin:0; font-weight:900; font-size:20px; }
  .wa-sub{ margin-top:6px; font-size:12px; font-weight:800; color:#94a3b8; }
</style>
<div class="container-fluid">
  <div class="wa-wrap">
    <div class="wa-card">
      <div class="wa-title">WhatsApp Web is disabled</div>
      <div class="wa-sub">Enable `WHATSAPP_ENABLED` in `.env` to use this module.</div>
    </div>
  </div>
</div>
{% endblock %}
