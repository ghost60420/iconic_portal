{% extends "crm/base.html" %}
{% block content %}
<style>
  .page{ max-width:860px; margin:18px auto; padding:0 12px; color:#f9fafb; font-family:Arial,sans-serif; }
  .card{ background: radial-gradient(circle at top left,#111827,#020617); border:1px solid #1f2937; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 14px 30px rgba(0,0,0,0.45); }
  .title{ margin:0 0 6px 0; font-size:20px; color:#fef9c3; font-weight:800; }
  .subtitle{ font-size:12px; color:#9ca3af; margin-bottom:10px; }
  input, select{ width:100%; padding:8px 10px; background:#020617; color:#f9fafb; border:1px solid #374151; border-radius:10px; font-size:13px; box-sizing:border-box; }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .actions{ margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
  .btn{ padding:9px 16px; background:#facc15; color:#111827; border-radius:999px; border:none; font-size:13px; font-weight:800; cursor:pointer; }
  .btn-ghost{ padding:9px 16px; border-radius:999px; border:1px solid rgba(148,163,184,0.35); background:rgba(255,255,255,0.04); color:#e5e7eb; font-size:13px; font-weight:800; text-decoration:none; }
  @media (max-width:700px){ .row{ grid-template-columns:1fr; } }
</style>

<div class="page">
  <div class="card">
    <h1 class="title">Research a single website</h1>
    <div class="subtitle">The system will analyze the site and queue a research job.</div>

    <form method="post">
      {% csrf_token %}
      <div class="row">
        <div>
          <label>Website or domain</label>
          <input type="text" name="website" placeholder="examplebrand.com">
        </div>
        <div>
          <label>Brand name (optional)</label>
          <input type="text" name="brand" placeholder="Brand name">
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label>Country (optional)</label>
          <input type="text" name="country" placeholder="Canada">
        </div>
        <div>
          <label>Assign to (optional)</label>
          <select name="assigned_to">
            <option value="">Unassigned</option>
            {% for u in users %}
              <option value="{{ u.username }}">{{ u.get_full_name|default:u.username }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn" type="submit">Queue research</button>
        <a class="btn-ghost" href="{% url 'lead_import_outbound' %}">Back to intake</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
